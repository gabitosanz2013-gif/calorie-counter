<!DOCTYPE html>\n<html lang="es">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Contador de Calorías</title>\n</head>\n<body>\n    <h1>Contador de Calorías</h1>\n    <p>Este es el código básico original del contador de calorías.</p>\n    <p>Aquí está la versión PRO mejorada:</p>\n    <h2>Versión PRO:</h2>\n    <label for="caloriesInput">Introduce tus calorías:</label>\n    <input type="number" id="caloriesInput">\n    <button id="calculateButton">Calcular</button>\n    <div id="result"></div>\n    <script>\n        document.getElementById('calculateButton').onclick = function() {\n            const calories = document.getElementById('caloriesInput').value;\n            const resultDiv = document.getElementById('result');\n            resultDiv.textContent = `Has introducido ${calories} calorías.`;\n        };\n    <\/script>\n</body>\n</html>
