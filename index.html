<!DOCTYPE html>\n<html lang="es">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Contador de Calorías PRO</title>\n    <link rel="stylesheet" href="styles.css">\n    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>\n</head>\n<body>\n    <h1>Contador de Calorías PRO</h1>\n    <form id="calorieForm">\n        <label for="food">Alimento:</label>\n        <input type="text" id="food" name="food" required>\n        <label for="calories">Calorías:</label>\n        <input type="number" id="calories" name="calories" required>\n        <button type="submit">Agregar</button>\n    </form>\n    <div id="history"></div>\n    <button id="exportBtn">Exportar a JSON/CSV</button>\n    <canvas id="calorieChart"></canvas>\n    <script>\n        let calorieHistory = [];\n        const form = document.getElementById('calorieForm');\n        const historyDiv = document.getElementById('history');\n        const exportBtn = document.getElementById('exportBtn');\n        const ctx = document.getElementById('calorieChart').getContext('2d');\n        const calorieChart = new Chart(ctx, {\n            type: 'bar',\n            data: {\n                labels: [],\n                datasets: [{\n                    label: 'Calorías',\n                    data: [],\n                    backgroundColor: 'rgba(75, 192, 192, 0.6)'\n                }]\n            },\n            options: {\n                scales: {\n                    y: {\n                        beginAtZero: true\n                    }\n                }\n            }\n        });\n        form.addEventListener('submit', function(event) {\n            event.preventDefault();\n            const food = document.getElementById('food').value;\n            const calories = document.getElementById('calories').value;\n            const entry = { food, calories };\n            calorieHistory.push(entry);\n            updateHistory();\n            updateChart();\n            form.reset();\n        });\n        exportBtn.addEventListener('click', function() {\n            exportData();\n        });\n        function updateHistory() {\n            historyDiv.innerHTML = '';\n            calorieHistory.forEach((entry, index) => {\n                const p = document.createElement('p');\n                p.textContent = `${index + 1}. ${entry.food}: ${entry.calories} calorías`;\n                historyDiv.appendChild(p);\n            });\n        }\n        function updateChart() {\n            calorieChart.data.labels = calorieHistory.map(entry => entry.food);\n            calorieChart.data.datasets[0].data = calorieHistory.map(entry => entry.calories);\n            calorieChart.update();\n        }\n        function exportData() {\n            const json = JSON.stringify(calorieHistory, null, 2);\n            const blob = new Blob([json], { type: 'application/json' });\n            const url = URL.createObjectURL(blob);\n            const a = document.createElement('a');\n            a.href = url;\n            a.download = 'calorie_history.json';\n            document.body.appendChild(a);\n            a.click();\n            document.body.removeChild(a);\n            URL.revokeObjectURL(url);\n        }\n    </script>\n</body>\n</html>
